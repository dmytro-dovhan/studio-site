name: Publish to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push site content to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -r --cached .github >/dev/null
          touch .nojekyll
          git add -A
          git commit -m "deploy: publish ${GITHUB_SHA::7} to gh-pages"
          git push --force origin HEAD:gh-pages
